<body>

            <div class="container-fluid">
                <a class="navbar-brand" href="../index.html">
                    <img src="../assets/logo.png"
                        alt="Logo de GamerSite con un mando (joystick) de pc y un conjunto gamer de teclado y mouse"
                        class="logo">
                </a>
                <h1 class="titulo">GamerSite</h1>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon">
                    </span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav flex-column w-100">
                        <li class="nav-item">
                            <a class="nav-link" href="./mab.html">Mount & Blade</a>

                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="./rac.html">Ratchet & Clank</a>

                        <li class="nav-item">

                        </li>
                    </ul>
                </div>
            </div>
        </nav>

    <main class="cont">
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4786.296131855765!2d-64.55979134716132!3d-31.976561609284506!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95d2b0447c2bd5ff%3A0x3245f2bd7c030f4c!2sPlaza%20Jose%20Hernandez!5e0!3m2!1ses!2sar!4v1768403848104!5m2!1ses!2sar" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade" class="maps"></iframe>

        <form>
            <label for="name">Nombre:</label>
            <input type="text" id="name" placeholder="John">

            <label for="surname">Apellido:</label>
            <input type="text" id="surname" placeholder="Doe">

            <label for="phone">Celular:</label>
            <input type="number" id="phone" placeholder="1234567891">

            <label for="mail">e-Mail:</label>
            <input type="email" placeholder="johndoe@gmail.com" id="mail">

            <label for="comments">Dejanos tus comentarios:</label>
            <textarea placeholder="Deja tus comentarios:" id="comments"></textarea>
            
            <div>
                <input type="submit" value="Enviar">
                <input type="reset" value="Comenzar de Nuevo">
            </div>
            

        </form>

        <iframe src="https://www.youtube.com/embed/uA4NB6C_1W8?si=83ViBQy3-pHXhTYh"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen class="music"></iframe>
    </main>

                    <a href="https://www.youtube.com" target="_blank">

                    </a>
                </li>
                <li>
                    <a href="https://web.whatsapp.com/" target="_blank">
                        <img src="../assets/logos/whatsapp.png" alt="Logo de WhatsApp" class="rs wa">
                    </a>
                </li>
